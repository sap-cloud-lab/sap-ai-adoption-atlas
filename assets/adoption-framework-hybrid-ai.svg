<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Hybrid AI Workspace for SAP business processes</title>
  <desc id="desc">A business use case passes through a fit and permission gate, then follows either an SAP Business AI lane or a managed custom AI lane. Both lanes rejoin through common governance and approval before the SAP system of record.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eaf4ff"/>
    </linearGradient>
    <linearGradient id="sapLane" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ebf3ff"/>
      <stop offset="1" stop-color="#dfeaff"/>
    </linearGradient>
    <linearGradient id="customLane" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5efff"/>
      <stop offset="1" stop-color="#eae1ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#082b55" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#2f6f9f"/>
    </marker>
    <style>
      .heading { font: 700 48px Arial, sans-serif; fill: #082b55; }
      .subheading { font: 400 22px Arial, sans-serif; fill: #526b82; }
      .node-title { font: 700 23px Arial, sans-serif; fill: #082b55; }
      .node-copy { font: 400 17px Arial, sans-serif; fill: #4b647b; }
      .on-dark-title { fill: #ffffff; }
      .on-dark-copy { fill: #d9eafa; }
      .lane-label { font: 700 16px Arial, sans-serif; letter-spacing: 1.5px; text-transform: uppercase; }
      .lane-title { font: 700 30px Arial, sans-serif; fill: #082b55; }
      .bullet { font: 400 18px Arial, sans-serif; fill: #264866; }
      .flow { fill: none; stroke: #2f6f9f; stroke-width: 4; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1600" height="1000" rx="36" fill="url(#background)"/>
  <text x="90" y="82" class="heading">Hybrid AI Workspace</text>
  <text x="90" y="120" class="subheading">Choose the delivery route per use case, then govern both routes as one portfolio.</text>

  <g filter="url(#shadow)">
    <rect x="90" y="175" width="450" height="130" rx="20" fill="#ffffff" stroke="#b9d2e8"/>
    <circle cx="140" cy="230" r="24" fill="#e4f4ff"/>
    <path d="M130 230h20M140 220v20" stroke="#1674ba" stroke-width="3" stroke-linecap="round"/>
    <text x="180" y="220" class="node-title">Business use-case intake</text>
    <text x="180" y="252" class="node-copy">Outcome · real process · volume · risk</text>
    <text x="180" y="278" class="node-copy">Evidence · customer-specific exceptions</text>
  </g>

  <path d="M555 240 H680" class="flow"/>

  <g filter="url(#shadow)">
    <rect x="700" y="160" width="810" height="160" rx="22" fill="#082b55"/>
    <circle cx="765" cy="240" r="30" fill="#1a5c91"/>
    <path d="M751 240l9 9 19-21" fill="none" stroke="#76d1ff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="820" y="215" class="node-title on-dark-title">Fit + permission gate</text>
    <text x="820" y="250" class="node-copy on-dark-copy">Process fit · supported interface · three-year cost</text>
    <text x="820" y="282" class="node-copy on-dark-copy">Adaptability · control · operating model · lock-in</text>
  </g>

  <path d="M1105 330 V370 H410 V405" class="flow"/>
  <path d="M1105 330 V370 H1185 V405" class="flow"/>

  <g filter="url(#shadow)">
    <rect x="90" y="420" width="650" height="330" rx="26" fill="url(#sapLane)" stroke="#8fb8dc"/>
    <rect x="90" y="420" width="12" height="330" rx="6" fill="#0a6ed1"/>
    <text x="140" y="470" class="lane-label" fill="#0a6ed1">SAP LANE</text>
    <text x="140" y="515" class="lane-title">SAP Business AI</text>
    <circle cx="157" cy="565" r="6" fill="#0a6ed1"/>
    <text x="180" y="572" class="bullet">Packaged capability fits the real process</text>
    <circle cx="157" cy="615" r="6" fill="#0a6ed1"/>
    <text x="180" y="622" class="bullet">Embedded or SAP-private context is essential</text>
    <circle cx="157" cy="665" r="6" fill="#0a6ed1"/>
    <text x="180" y="672" class="bullet">No supported external doorway for a required step</text>
    <circle cx="157" cy="715" r="6" fill="#0a6ed1"/>
    <text x="180" y="722" class="bullet">SAP lifecycle and economics are acceptable</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="860" y="420" width="650" height="330" rx="26" fill="url(#customLane)" stroke="#b6a0e5"/>
    <rect x="860" y="420" width="12" height="330" rx="6" fill="#7147c8"/>
    <text x="910" y="470" class="lane-label" fill="#7147c8">MANAGED CUSTOM LANE</text>
    <text x="910" y="515" class="lane-title">Our Custom AI Platform</text>
    <circle cx="927" cy="565" r="6" fill="#7147c8"/>
    <text x="950" y="572" class="bullet">Customer-specific patterns drive the outcome</text>
    <circle cx="927" cy="615" r="6" fill="#7147c8"/>
    <text x="950" y="622" class="bullet">Published API, event, A2A, or MCP path exists</text>
    <circle cx="927" cy="665" r="6" fill="#7147c8"/>
    <text x="950" y="672" class="bullet">Adaptability, reuse, and cost favour custom</text>
    <circle cx="927" cy="715" r="6" fill="#7147c8"/>
    <text x="950" y="722" class="bullet">Run on our platform or inside customer BTP</text>
  </g>

  <path d="M410 765 V805 H340 V840" class="flow"/>
  <path d="M1185 765 V805 H340 V840" class="flow"/>

  <g filter="url(#shadow)">
    <rect x="90" y="850" width="420" height="105" rx="20" fill="#ffffff" stroke="#b9d2e8"/>
    <text x="125" y="894" class="node-title">Common governance</text>
    <text x="125" y="926" class="node-copy">Identity · policy · evaluation · logs · budgets</text>
  </g>
  <path d="M525 902 H625" class="flow"/>
  <g filter="url(#shadow)">
    <rect x="645" y="850" width="410" height="105" rx="20" fill="#fff7e8" stroke="#e8bd69"/>
    <text x="680" y="894" class="node-title">Human / SAP-native approval</text>
    <text x="680" y="926" class="node-copy">Closed and consequential actions stay controlled</text>
  </g>
  <path d="M1070 902 H1160" class="flow"/>
  <g filter="url(#shadow)">
    <rect x="1180" y="850" width="330" height="105" rx="20" fill="#082b55"/>
    <text x="1215" y="894" class="node-title on-dark-title">SAP system of record</text>
    <text x="1215" y="926" class="node-copy on-dark-copy">Public or Private Edition</text>
  </g>
</svg>
